<!DOCTYPE html>
<html>

<head>

<title>Image Watermark Tool</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="paper"></div>

<h1 class="stamp">Markr.exe</h1>
<p class="subtitle">A minimal image watermarking utility</p>

<div class="wrapper">

<div class="controls">

<form method="POST" enctype="multipart/form-data">

<label class="file-upload">
Choose file
<input type="file" name="image" id="imageInput" required>
</label>

<span id="fileName">No file chosen</span>

<input type="text" name="watermark" id="watermarkText" placeholder="Enter watermark text">

<label>Position</label>

<select name="position" id="positionSelect">
<option value="bottom-right">Bottom Right</option>
<option value="bottom-left">Bottom Left</option>
<option value="top-right">Top Right</option>
<option value="top-left">Top Left</option>
<option value="center">Center</option>
</select>

<label>Opacity</label>

<input type="range" name="opacity" id="opacitySlider" min="40" max="200" value="100" disabled>

<button type="submit">Generate Watermark</button>

</form>

</div>

<div class="preview">

<h2>Preview</h2>

<div class="image-preview">

<img id="previewImage"
{% if filename %}
src="/outputs/{{ filename }}"
{% endif %}
style="max-width:100%; max-height:80vh; object-fit:contain;"
>

<div id="watermarkOverlay"></div>

</div>

{% if filename %}
<a href="/outputs/{{ filename }}" download>
<button class="download-btn">Download Image</button>
</a>
{% else %}
<button class="download-btn" disabled>Download Image</button>
{% endif %}}

</div>

</div>

<footer>
made by <a href="https://github.com/abhiram289">abhiram289</a>
</footer>

<script>

/* get elements */

const imageInput = document.getElementById("imageInput");
const previewImage = document.getElementById("previewImage");
const opacitySlider = document.getElementById("opacitySlider");
const fileName = document.getElementById("fileName");

const textInput = document.getElementById("watermarkText");
const overlay = document.getElementById("watermarkOverlay");
const positionSelect = document.getElementById("positionSelect");

/* preview uploaded image */

imageInput.addEventListener("change", function(){

const file = this.files[0];

if(file){

previewImage.src = URL.createObjectURL(file);

fileName.textContent = file.name;

opacitySlider.disabled = false;

}

});

/* default watermark position */

overlay.style.bottom = "40px";
overlay.style.right = "40px";

/* live watermark text */

textInput.addEventListener("input", () => {

overlay.textContent = textInput.value;

});

/* live opacity */

opacitySlider.addEventListener("input", () => {

overlay.style.opacity = opacitySlider.value / 200;

});

/* live position */

positionSelect.addEventListener("change", () => {

overlay.style.top = "";
overlay.style.bottom = "";
overlay.style.left = "";
overlay.style.right = "";
overlay.style.transform = "";

switch(positionSelect.value){

case "bottom-right":
overlay.style.bottom = "40px";
overlay.style.right = "40px";
break;

case "bottom-left":
overlay.style.bottom = "40px";
overlay.style.left = "40px";
break;

case "top-right":
overlay.style.top = "40px";
overlay.style.right = "40px";
break;

case "top-left":
overlay.style.top = "40px";
overlay.style.left = "40px";
break;

case "center":
overlay.style.top = "50%";
overlay.style.left = "50%";
overlay.style.transform = "translate(-50%, -50%)";
break;

}

});

</script>

</body>
</html>

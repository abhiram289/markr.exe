<!DOCTYPE html>
<html>

<head>
<title>Image Watermark Tool</title>
</head>

<body>

<h2>Upload Image</h2>

<form method="POST" enctype="multipart/form-data">

<input type="file" name="image" required>

<br><br>

<input type="text" name="watermark" placeholder="Enter watermark text">

<br><br>

<button type="submit">Generate Watermark</button>

</form>

{% if filename %}

<h3>Watermarked Image</h3>

<img src="/outputs/{{ filename }}" width="400">

{% endif %}

</body>
</html>
